name: CI-CD Production Readiness Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/sultanzer/sre-capstone-ecommerce-api

jobs:
  build-push-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Validate Node.js source code
        working-directory: app
        run: node -c src/server.js

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest ./app

      - name: Push Docker image to GHCR
        if: github.event_name == 'push'
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Validate Kubernetes manifests
        run: |
          test -f k8s/app/deployment.yaml
          test -f k8s/app/namespace.yaml
          test -f k8s/monitoring/prometheus.yaml
          test -f k8s/monitoring/grafana.yaml
          test -f k8s/monitoring/alertmanager.yaml

      - name: Validate Terraform files
        run: |
          test -f terraform/main.tf
          test -f terraform/variables.tf
          test -f terraform/versions.tf
          test -f terraform/terraform.tfvars.example

      - name: Validate monitoring and load testing files
        run: |
          test -f prometheus.local.yml
          test -f grafana/dashboards/ecommerce-sre-dashboard.json
          test -f locust/locustfile.py