name: CI-CD Production Readiness Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Smoke test application
        working-directory: ./app
        run: |
          npm start &
          sleep 5
          curl -f http://localhost:4000/health
          curl -f http://localhost:4000/metrics

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sre-capstone-ecommerce-api:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/sre-capstone-ecommerce-api:latest

      - name: Configure kubeconfig
        if: github.event_name == 'push'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        if: github.event_name == 'push'
        run: |
          kubectl apply -f k8s/app/namespace.yaml
          kubectl apply -f k8s/app/deployment.yaml
          kubectl -n sre-capstone set image deployment/ecommerce-api ecommerce-api=ghcr.io/${{ github.repository_owner }}/sre-capstone-ecommerce-api:${{ github.sha }}
          kubectl apply -f k8s/monitoring/alertmanager.yaml
          kubectl apply -f k8s/monitoring/prometheus.yaml
          kubectl apply -f k8s/monitoring/grafana.yaml
          kubectl -n sre-capstone rollout status deployment/ecommerce-api --timeout=120s
