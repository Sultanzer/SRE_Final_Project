apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: sre-capstone
data:
  alertmanager.yml: |
    route:
      receiver: 'default-receiver'
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 2h
    receivers:
      - name: 'default-receiver'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: sre-capstone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: sre-capstone
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
  type: ClusterIP
